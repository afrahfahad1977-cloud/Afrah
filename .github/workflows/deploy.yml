name: نشر منصة كلية العلوم على GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# السماح بنشر واحد متزامن وإلغاء عمليات النشر القيد الانتظار
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: سحب المستودع
        uses: actions/checkout@v4

      - name: إعداد Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: رفع ملفات الموقع
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: النشر على GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
